name: Terraform Plan

on:
  pull_request:
    paths:
      - "infra/**"

permissions:
  pull-requests: write

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
      - name: Terraform fmt check
        run: cd infra && terraform fmt -check -recursive
      - name: Terraform Init
        id: init
        run: cd infra && terraform init
      - name: Terraform Plan
        id: plan
        run: cd infra && terraform plan -no-color 2>&1 | tee /tmp/tfplan.txt
        continue-on-error: true
      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/tfplan.txt', 'utf8').slice(0, 60000);
            const outcome = '${{ steps.plan.outcome }}';
            const body = `#### Terraform Plan \`${outcome}\`
            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${plan}
            \`\`\`
            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
